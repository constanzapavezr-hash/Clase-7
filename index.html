<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ELECTIVOS DE DISEÑO</title>
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --color-oscurisimo: #327574;
                --color-oscuro: #06ccc9;
                --color-normal: #327574;
                --color-iluminado: #4ac2c0;
                --color-iluminadisimo: #87eddc;
				--fyebte-serifa:Georgia, serif;
				--fuente-palote:Helvetica, sans-serif
            }

            body {
                font-family: Helvetica, Arial, sans-serif;
                color: var(--color-normal);
                text-align: center;
                font-size: 100%;
            }
            div#contenedor {
                margin: 1rem auto;
                width: 90%;
                max-width: 780px;
            }

            h1 {
                margin: 1rem 0;
                font-weight: 400;
                font-size: calc(100% + 3vw + 3vh);
            }

            h2 {
                margin: 3rem 0;
                font-weight: 400;
                letter-spacing: 0.25rem;
                font-size: calc(100% + 1vw + 1vh);
                color: var(--color-oscuro);
            }

            input {
                border: 0.1rem solid var(--color-iluminado);
                padding: 0.5rem 1rem;
                font-family: inherit;
                font-size: 15px;
                color: var(--color-oscuro);
                outline: none;
                margin-bottom: 1.5rem;
                width: 100%;
                display: block;
                background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="lightgreen" class="bi bi-emoji-smile-upside-down" viewBox="0 0 16 16"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1m0-1a8 8 0 1 1 0 16A8 8 0 0 1 8 0"/><path d="M4.285 6.433a.5.5 0 0 0 .683-.183A3.5 3.5 0 0 1 8 4.5c1.295 0 2.426.703 3.032 1.75a.5.5 0 0 0 .866-.5A4.5 4.5 0 0 0 8 3.5a4.5 4.5 0 0 0-3.898 2.25.5.5 0 0 0 .183.683M7 9.5C7 8.672 6.552 8 6 8s-1 .672-1 1.5.448 1.5 1 1.5 1-.672 1-1.5m4 0c0-.828-.448-1.5-1-1.5s-1 .672-1 1.5.448 1.5 1 1.5 1-.672 1-1.5"/></svg>');
                background-repeat: no-repeat;
                background-size: 1rem;
                background-position: 99% center;
            }

            input::placeholder {
                color: var(--color-iluminado);
            }

            input:focus {
                border-color: var(--color-normal);
            }

            div#contenedordetabla {
                overflow-x: auto;
                font-size: 90%;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: left;
                margin-bottom: 3rem;
            }

            thead {
                background: var(--color-iluminado);
            }

            td,
            th {
                border: 1px solid var(--color-normal);
                padding: 0.75rem;
            }

            td:nth-child(1),
            th:nth-child(1),
            td:nth-child(3),
            th:nth-child(3) {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>ᕙ( •̀ ᗜ •́ )ᕗ</h1>
            <h2>ELECTIVOS DE DISEÑO</h2>

            <input type="text" id="elInput" placeholder="Filtrar electivos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>N°</th>
                            <th>Asignatura electiva</th>
                            <th>Mención</th>
                            <th>Grupo</th>
                            <th>Enfoque</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
            <small>Diseño y visualización de información</small>
        </div>

        <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/777b6c53-f289-4fcc-8788-9162abebf7b1";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}"><td>${x.id}</td><td>${x.name}</td><td>${x.track}</td><td>${x.group}</td><td>${x.focus}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
